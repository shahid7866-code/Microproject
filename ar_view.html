<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>3D View</title>

  <!-- model-viewer -->
  <script type="module"
    src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
  </script>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-family: Arial, sans-serif;
    }

    .viewer-box {
      width: 90%;
      max-width: 900px;
      height: 80vh;
      border-radius: 20px;
      background: radial-gradient(circle, #111, #000);
      box-shadow: 0 0 40px rgba(0,0,0,0.8);
      padding: 10px;
    }

    model-viewer {
      width: 100%;
      height: 100%;
    }
  </style>
</head>

<body>

<div class="viewer-box">
  <model-viewer
    id="viewer"
    src=""
    camera-controls
    auto-rotate
    shadow-intensity="1"
    exposure="1.2"
    environment-image="neutral">
  </model-viewer>
</div>

<script>
  // get value from URL
  const params = new URLSearchParams(window.location.search);
  const place = params.get("place");

  let model = "";

  if(place === "taj"){
      model = "models/tajmahal.glb";
  }
  else if(place === "hampi"){
      model = "models/hampi.glb";
  }
  else if(place === "museum"){
      model = "models/museum.glb";
  }
  else{
      model = "models/tajmahal.glb"; // default
  }

  document.getElementById("viewer").setAttribute("src", model);
</script>

</body>
</html>
