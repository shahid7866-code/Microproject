<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Cultural Heritage</title>

    <style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    color:white;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    background: radial-gradient(circle at top, #0b0f2b, #000);
    overflow:hidden;
}

/* ASTEROIDS */
.asteroid{
    position:absolute;
    top:-50px;
    width:4px;
    height:40px;
    background: linear-gradient(to bottom, #fff, transparent);
    animation: fall linear infinite;
}

@keyframes fall{
    from{ transform: translateY(0); }
    to{ transform: translateY(120vh) translateX(-80px); }
}

h2{
    margin-top:40px;
    font-size:28px;
}

/* CARDS CONTAINER */
.cards{
    display:flex;
    gap:40px;
    margin-top:50px;
    flex-wrap:wrap;
    justify-content:center;
    width:100%;
    padding:20px;
}

/* CARD */
.card{
    flex:1 1 300px;
    max-width:350px;
    padding:35px;
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(14px);
    border-radius:20px;
    text-align:center;
    box-shadow:0 0 30px rgba(0,0,0,0.8);
    transition:0.35s;
}

.card:hover{
    transform:translateY(-10px) scale(1.05);
}

/* TEXT */
.card h3{
    font-size:22px;
    margin-bottom:15px;
}

.card p{
    font-size:16px;
    margin-bottom:25px;
}

/* BUTTON */
.card a{
    display:inline-block;
    padding:12px 28px;
    border-radius:25px;
    background: linear-gradient(135deg,#6fb1ff,#4da6ff);
    color:black;
    text-decoration:none;
    font-weight:bold;
    font-size:16px;
}

.card a:hover{
    background:#1e90ff;
}

/* FOOTER */
footer{
    margin-top:auto;
    width:100%;
    padding:15px;
    text-align:center;
    background:rgba(0,0,0,0.45);
}
    </style>
</head>

<body>

<h2>Select a Cultural Heritage Site</h2>

<div class="cards">

    <div class="card">
        <h3>Taj Mahal</h3>
        <p>Symbol of love and Indian heritage.</p>
        <a href="ar_view.html?place=taj">View</a>
    </div>

    <div class="card">
        <h3>Hampi</h3>
        <p>Historic ruins of Vijayanagara Empire.</p>
        <a href="ar_view.html?place=hampi">View</a>
    </div>

    <div class="card">
        <h3>Museum</h3>
        <p>Explore artifacts in 3D.</p>
        <a href="ar_view.html?place=museum">View</a>
    </div>

</div>

<footer>
    © 2026 | AR-Based Cultural Heritage Platform 
</footer>

<script>
for(let i=0;i<40;i++){
    let a = document.createElement("div");
    a.className = "asteroid";
    a.style.left = Math.random()*100 + "vw";
    a.style.animationDuration = (3 + Math.random()*5) + "s";
    document.body.appendChild(a);
}
</script>

</body>
</html>
