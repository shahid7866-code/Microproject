<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>User Login</title>

    <style>
        /* ===== RESET ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ===== UNIVERSE BACKGROUND ===== */
        body {
            height: 100vh;
            overflow: hidden;
            background: radial-gradient(circle at top, #0a0f2c, #000000 70%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            color: white;
        }

        /* ===== STARS ===== */
        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            opacity: 0.8;
            animation: moveStar linear infinite;
        }

        @keyframes moveStar {
            from { transform: translateY(100vh); }
            to { transform: translateY(-10vh); }
        }

        /* ===== LOGIN BOX ===== */
        .login-box {
            position: relative;
            z-index: 2;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(14px);
            padding: 30px;
            width: 340px;
            border-radius: 14px;
            text-align: center;
            box-shadow:
                0 0 30px rgba(0,0,0,0.9),
                0 0 40px rgba(120,100,255,0.4);
        }

        .login-box h2 {
            margin-bottom: 20px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* ===== INPUTS ===== */
        .login-box input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border: none;
            outline: none;
            border-radius: 6px;
            background: #0b0f2a;
            color: white;
        }

        .login-box input:focus {
            box-shadow: 0 0 12px #7f7cff;
        }

        /* ===== BUTTON ===== */
        .login-box button {
            width: 95%;
            padding: 10px;
            margin-top: 15px;
            border: none;
            border-radius: 20px;
            background: linear-gradient(135deg, #7f7cff, #4da6ff);
            color: black;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .login-box button:hover {
            transform: scale(1.06);
            box-shadow: 0 0 20px rgba(127,124,255,0.9);
        }

        /* ===== LINK ===== */
        .login-box a {
            color: #7f7cff;
            text-decoration: none;
        }

        .login-box a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<!-- STARS GENERATOR -->
<script>
    for (let i = 0; i < 80; i++) {
        let star = document.createElement("div");
        star.className = "star";
        star.style.left = Math.random() * 100 + "vw";
        star.style.animationDuration = (5 + Math.random() * 10) + "s";
        star.style.opacity = Math.random();
        document.body.appendChild(star);
    }
</script>

<div class="login-box">
    <h2>User Login</h2>

    <form action="login.php" method="post">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <p style="margin-top:15px;">
        New user? <a href="register.html">Register here</a>
    </p>
</div>

</body>
</html>
